<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background coral-soft -->
  <rect width="800" height="600" fill="#FFE5E5"/>

  <!-- Pattern puntini -->
  <g fill="#ff4d4d" opacity="0.15">
    <circle cx="80" cy="80" r="3"/>
    <circle cx="180" cy="120" r="3"/>
    <circle cx="720" cy="180" r="3"/>
    <circle cx="680" cy="100" r="3"/>
    <circle cx="620" cy="60" r="3"/>
    <circle cx="100" cy="500" r="3"/>
    <circle cx="720" cy="520" r="3"/>
    <circle cx="620" cy="560" r="3"/>
  </g>

  <!-- Specchio ovale centrale -->
  <!-- Ombra -->
  <ellipse cx="405" cy="325" rx="160" ry="200" fill="#1a1a1a" opacity="0.1"/>
  <!-- Cornice esterna (oro/scuro) -->
  <ellipse cx="400" cy="320" rx="160" ry="200" fill="#1a1a1a"/>
  <!-- Bordo interno decorativo -->
  <ellipse cx="400" cy="320" rx="150" ry="190" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.6"/>
  <!-- Vetro specchio (mint chiaro per riflesso) -->
  <ellipse cx="400" cy="320" rx="140" ry="180" fill="#D1F5EA"/>
  <ellipse cx="400" cy="320" rx="140" ry="180" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Riflessi sullo specchio -->
  <ellipse cx="360" cy="260" rx="40" ry="60" fill="#FFFFFF" opacity="0.5"/>
  <ellipse cx="440" cy="400" rx="20" ry="30" fill="#FFFFFF" opacity="0.3"/>

  <!-- Decoro cornice (puntini sulla cornice) -->
  <g fill="#ff4d4d" opacity="0.6">
    <circle cx="400" cy="128" r="4"/>
    <circle cx="400" cy="512" r="4"/>
    <circle cx="248" cy="320" r="4"/>
    <circle cx="552" cy="320" r="4"/>
  </g>

  <!-- Forbici grandi in primo piano (diagonale) -->
  <g transform="translate(200, 400) rotate(-25)">
    <!-- Lama sinistra -->
    <polygon points="0,0 180,-8 180,6 3,14" fill="#E0E0E0" stroke="#1a1a1a" stroke-width="2"/>
    <polygon points="0,0 180,-8 180,-2 3,6" fill="#FFFFFF" stroke="none" opacity="0.6"/>
    
    <!-- Lama destra -->
    <polygon points="0,0 180,8 180,-6 3,-14" fill="#B8B8B8" stroke="#1a1a1a" stroke-width="2"/>
    
    <!-- Vite centrale -->
    <circle cx="2" cy="0" r="6" fill="#1a1a1a"/>
    <circle cx="2" cy="0" r="3" fill="#ff4d4d"/>
    
    <!-- Impugnatura ad anello 1 -->
    <circle cx="-40" cy="-25" r="28" fill="none" stroke="#1a1a1a" stroke-width="10"/>
    <circle cx="-40" cy="-25" r="28" fill="none" stroke="#ff4d4d" stroke-width="4" opacity="0.5"/>
    
    <!-- Impugnatura ad anello 2 -->
    <circle cx="-40" cy="25" r="28" fill="none" stroke="#1a1a1a" stroke-width="10"/>
    <circle cx="-40" cy="25" r="28" fill="none" stroke="#ff4d4d" stroke-width="4" opacity="0.5"/>
    
    <!-- Collegamento impugnature -->
    <line x1="-20" y1="-10" x2="2" y2="0" stroke="#1a1a1a" stroke-width="4"/>
    <line x1="-20" y1="10" x2="2" y2="0" stroke="#1a1a1a" stroke-width="4"/>
  </g>

  <!-- Flacone/bottiglia prodotto a destra -->
  <g transform="translate(600, 380)">
    <!-- Tappo -->
    <rect x="-18" y="-80" width="36" height="20" rx="4" fill="#1a1a1a"/>
    <!-- Collo -->
    <rect x="-10" y="-60" width="20" height="12" fill="#1a1a1a"/>
    <!-- Corpo -->
    <rect x="-35" y="-48" width="70" height="110" rx="8" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Etichetta -->
    <rect x="-28" y="-20" width="56" height="55" rx="3" fill="#ff4d4d" opacity="0.15"/>
    <rect x="-28" y="-20" width="56" height="55" rx="3" fill="none" stroke="#ff4d4d" stroke-width="1.5" opacity="0.7"/>
    <!-- Testo etichetta (linee) -->
    <line x1="-22" y1="-10" x2="22" y2="-10" stroke="#ff4d4d" stroke-width="2" opacity="0.6"/>
    <line x1="-22" y1="0" x2="16" y2="0" stroke="#ff4d4d" stroke-width="2" opacity="0.6"/>
    <line x1="-22" y1="10" x2="18" y2="10" stroke="#ff4d4d" stroke-width="1.5" opacity="0.4"/>
    <line x1="-22" y1="18" x2="14" y2="18" stroke="#ff4d4d" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Sparkles decorativi -->
  <g fill="#ff4d4d">
    <polygon points="150,180 153,188 161,188 154,193 157,201 150,196 143,201 146,193 139,188 147,188" opacity="0.5"/>
    <polygon points="680,300 683,308 691,308 684,313 687,321 680,316 673,321 676,313 669,308 677,308" opacity="0.5"/>
  </g>
</svg>
