<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#D6E9FB"/>
  <g fill="#3ba3ff" opacity="0.15">
    <circle cx="80" cy="80" r="3"/>
    <circle cx="180" cy="120" r="3"/>
    <circle cx="720" cy="180" r="3"/>
    <circle cx="100" cy="500" r="3"/>
    <circle cx="720" cy="520" r="3"/>
  </g>

  <!-- Dente stilizzato elegante -->
  <g transform="translate(400, 300)">
    <!-- Ombra -->
    <path d="M -110 -120 Q -135 -130 -135 -80 Q -135 -20 -125 40 Q -115 100 -90 130 Q -60 150 -40 120 Q -20 80 0 80 Q 20 80 40 120 Q 60 150 90 130 Q 115 100 125 40 Q 135 -20 135 -80 Q 135 -130 110 -120 Q 80 -130 0 -130 Q -80 -130 -110 -120 Z" fill="#1a1a1a" opacity="0.1" transform="translate(6,6)"/>
    <!-- Corpo dente -->
    <path d="M -110 -120 Q -135 -130 -135 -80 Q -135 -20 -125 40 Q -115 100 -90 130 Q -60 150 -40 120 Q -20 80 0 80 Q 20 80 40 120 Q 60 150 90 130 Q 115 100 125 40 Q 135 -20 135 -80 Q 135 -130 110 -120 Q 80 -130 0 -130 Q -80 -130 -110 -120 Z" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Riflesso principale -->
    <path d="M -80 -90 Q -90 -80 -92 -30 Q -90 20 -82 50" stroke="#FFFFFF" stroke-width="8" fill="none" opacity="0.7" stroke-linecap="round"/>
    <!-- Riflesso secondario -->
    <path d="M -60 -60 Q -68 -50 -70 -10" stroke="#3ba3ff" stroke-width="3" fill="none" opacity="0.3" stroke-linecap="round"/>
    <!-- Sparkle shine in alto-destra -->
    <polygon points="70,-60 74,-48 86,-44 74,-40 70,-28 66,-40 54,-44 66,-48" fill="#3ba3ff" opacity="0.8"/>
    <polygon points="95,-20 97,-12 105,-10 97,-8 95,0 93,-8 85,-10 93,-12" fill="#3ba3ff" opacity="0.5"/>
  </g>

  <!-- Arco dentale piccolo in basso -->
  <g transform="translate(400, 480)" opacity="0.4">
    <path d="M -80 0 Q -40 -20 0 -20 Q 40 -20 80 0" stroke="#1a1a1a" stroke-width="2" fill="none"/>
    <g fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1">
      <rect x="-72" y="-10" width="14" height="16" rx="3"/>
      <rect x="-54" y="-14" width="14" height="18" rx="3"/>
      <rect x="-34" y="-18" width="14" height="22" rx="3"/>
      <rect x="-14" y="-20" width="14" height="24" rx="3"/>
      <rect x="6" y="-20" width="14" height="24" rx="3"/>
      <rect x="26" y="-18" width="14" height="22" rx="3"/>
      <rect x="46" y="-14" width="14" height="18" rx="3"/>
      <rect x="64" y="-10" width="14" height="16" rx="3"/>
    </g>
  </g>
</svg>
