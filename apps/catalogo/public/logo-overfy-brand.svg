<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 320" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Overfy">
  <defs>
    <linearGradient id="overfy-arrow-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c896"/>
      <stop offset="100%" stop-color="#3ba3ff"/>
    </linearGradient>
    <!-- maschera per far passare la freccia DIETRO le lettere dove serve -->
  </defs>

  <!-- 3 pallini -->
  <circle cx="110" cy="160" r="82" fill="#ff4d4d"/>
  <circle cx="220" cy="160" r="82" fill="#00c896"/>
  <circle cx="330" cy="160" r="82" fill="#3ba3ff"/>

  <!-- Wordmark "Overfy" in Georgia serif -->
  <text x="460" y="235"
        font-family="Georgia, 'Times New Roman', Times, serif"
        font-size="230"
        font-weight="400"
        fill="currentColor">Overfy</text>

  <!-- Freccia gradient che parte sotto "O" e attraversa fino sopra "y" -->
  <path d="M 510 295 Q 900 330 1220 80"
        fill="none"
        stroke="url(#overfy-arrow-grad)"
        stroke-width="26"
        stroke-linecap="round"/>
  <path d="M 1220 80 L 1158 72 M 1220 80 L 1205 140"
        fill="none"
        stroke="url(#overfy-arrow-grad)"
        stroke-width="26"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
